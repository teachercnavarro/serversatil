<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURO-CORE | Red Digital</title>
    
    <!-- Librería de Grafos -->
    <script type="text/javascript" src="https://unpkg.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root { --bg-color: #020205; --neon-cyan: #00f3ff; --neon-purple: #bc00ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: var(--neon-cyan); font-family: 'Space Mono', monospace; overflow: hidden; }
        #header { position: absolute; top: 20px; left: 20px; z-index: 10; border-left: 3px solid var(--neon-purple); padding-left: 10px; }
        #mynetwork { width: 100vw; height: 100vh; outline: none; }
        #info-panel { 
            position: absolute; right: 20px; top: 20px; width: 280px; 
            background: rgba(5, 5, 15, 0.95); border: 1px solid var(--neon-cyan); 
            padding: 15px; display: none; z-index: 100; box-shadow: 0 0 15px rgba(0,243,255,0.3);
        }
        .code-box { background: #000; color: #0f0; padding: 10px; font-size: 0.8rem; border: 1px dashed var(--neon-purple); margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="header">
        <h1>NEURO-NET_SYS</h1>
        <small>HAZ CLIC EN UN NODO PARA EXPLORAR</small>
    </div>

    <div id="mynetwork"></div>

    <div id="info-panel">
        <h3 id="node-title" style="margin:0; color:var(--neon-purple);"></h3>
        <p id="node-desc" style="font-size:0.85rem; color:#fff;"></p>
        <div class="code-box" id="node-code"></div>
        <button onclick="document.getElementById('info-panel').style.display='none'" style="margin-top:10px; width:100%; cursor:pointer; background:#111; color:#eee; border:1px solid #444;">CERRAR</button>
    </div>

    <script type="text/javascript">
        // 1. Base de datos
        const nodeInfo = {
            2: { t: 'PYTHON', d: 'Líder en IA y análisis de datos.', c: 'print("Hello Neuro")' },
            3: { t: 'JAVASCRIPT', d: 'El motor de la web interactiva.', c: 'console.log("Ready");' },
            4: { t: 'C++', d: 'Control total y alto rendimiento.', c: 'std::cout << "Fast";' },
            5: { t: 'JAVA', d: 'Estándar en apps empresariales.', c: 'System.out.print("Java");' }
        };

        // 2. Nodos y Conexiones
        var nodes = new vis.DataSet([
            { id: 1, label: 'MUNDO\nDIGITAL', shape: 'diamond', size: 40, color: '#000', font: {color:'#fff', size:20} },
            { id: 2, label: 'PYTHON', shape: 'dot', size: 25 },
            { id: 3, label: 'JAVASCRIPT', shape: 'dot', size: 25 },
            { id: 4, label: 'C++', shape: 'dot', size: 25 },
            { id: 5, label: 'JAVA', shape: 'dot', size: 25 }
        ]);

        var edges = new vis.DataSet([
            { from: 1, to: 2 }, { from: 1, to: 3 }, { from: 1, to: 4 }, { from: 1, to: 5 }
        ]);

        // 3. Inicialización
        var container = document.getElementById('mynetwork');
        var network = new vis.Network(container, { nodes, edges }, {
            nodes: { color: { border: '#00f3ff', background: '#020205' }, font: { color: '#00f3ff' } },
            physics: { enabled: true, solver: 'forceAtlas2Based' }
        });

        // 4. Lógica de Clic Corregida
        network.on("click", function (params) {
            const panel = document.getElementById('info-panel');
            if (params.nodes.length > 0) {
                const id = params.nodes[0]; // Captura el ID correctamente
                const data = nodeInfo[id];
                if (data) {
                    panel.style.display = 'block';
                    document.getElementById('node-title').innerText = data.t;
                    document.getElementById('node-desc').innerText = data.d;
                    document.getElementById('node-code').innerText = data.c;
                }
            } else {
                panel.style.display = 'none';
            }
        });
    </script>
</body>
</html>
